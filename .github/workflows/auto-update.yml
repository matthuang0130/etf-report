name: 自動爬蟲與更新 ETF 報表

on:
  push:
    paths:
      - 'data/**'
  # 🌟 自動排程 (Cron Job)
  # 每天 11:30 UTC (台灣時間晚上 7:30) 執行，1-5 代表週一到週五
  schedule:
    - cron: '30 11 * * 1-5'
  # 🌟 允許在 GitHub 網頁上手動點擊執行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest # GitHub 的 Linux 雲端電腦

    steps:
      - name: 1. 下載您的程式碼
        uses: actions/checkout@v4

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝必備套件 (包含爬蟲所需的 selenium 與 requests)
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests selenium webdriver-manager

      - name: 4. 🤖 執行自動爬蟲抓取最新檔案
        run: python etf_downloader.py

      - name: 5. 🧮 執行自動清洗與產出報表
        run: python script/generate.py

      - name: 6. 💾 將新檔案與報表存檔並推回 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 機器人自動抓檔與更新報表" && git push)