<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投信成分股異動看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; font-family: 'Noto Sans TC', sans-serif; display: flex; justify-content: center; padding: 0; margin: 0; }
        
        .infographic { width: 100%; max-width: 720px; background-color: #060a14; border-left: 2px solid #1a2c4e; border-right: 2px solid #1a2c4e; border-bottom: 2px solid #1a2c4e; overflow: hidden; }
        
        /* 總標題區 */
        .main-header { background: linear-gradient(180deg, #0f1c35 0%, #060a14 100%); text-align: center; padding: 14px 10px 10px; border-bottom: 2px solid #1a2c4e; border-top: 2px solid #1a2c4e; position: relative; }
        .main-header::after { content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); width: 250px; height: 2px; background: #00aaff; box-shadow: 0 0 10px #00aaff; }
        .main-title { color: #fff; font-size: 22px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 170, 255, 0.5); margin-bottom: 4px; }
        @media (min-width: 600px) { .main-title { font-size: 28px; } }
        .date-badge { display: inline-block; background: rgba(0, 170, 255, 0.15); color: #00aaff; padding: 2px 14px; border-radius: 12px; font-size: 13px; font-weight: 700; border: 1px solid rgba(0, 170, 255, 0.3); letter-spacing: 1px; }
        
        /* 🌟 終極升級：頂部橫向滾動日曆選單樣式 */
        .date-menu { display: flex; gap: 8px; padding: 12px 14px; background: #0b111e; border-bottom: 1px solid #1a2c4e; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .date-menu::-webkit-scrollbar { height: 4px; }
        .date-menu::-webkit-scrollbar-thumb { background: #1a2c4e; border-radius: 2px; }
        .menu-btn { display: inline-block; padding: 6px 16px; background: #111a2e; color: #8898aa; text-decoration: none; border-radius: 20px; font-size: 14px; font-weight: 700; border: 1px solid #1e2c45; transition: all 0.2s; }
        .menu-btn.active { background: #00aaff; color: #fff; border-color: #00aaff; box-shadow: 0 0 10px rgba(0, 170, 255, 0.4); }
        
        /* 單檔 ETF 區塊 */
        .etf-section { padding: 14px; border-bottom: 2px solid #1a2c4e; }
        .etf-section:last-child { border-bottom: none; }
        .etf-title { color: #e0e6ed; font-size: 17px; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .etf-title span { color: #00aaff; background: rgba(0, 170, 255, 0.1); padding: 1px 6px; border-radius: 4px; border: 1px solid #00aaff; font-size: 15px; }
        
        /* 網格排版 */
        .tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
        @media (max-width: 600px) { .tables-grid { grid-template-columns: 1fr; gap: 16px; } }
        
        .table-box { background: #0d1424; border-radius: 6px; overflow: hidden; border: 1px solid #1e2c45; }
        .box-header { display: flex; justify-content: space-between; padding: 6px 12px; font-size: 13px; font-weight: 700; }
        
        .header-buy { background: rgba(239, 68, 68, 0.15); color: #f87171; border-bottom: 2px solid #ef4444; }
        .header-sell { background: rgba(34, 197, 94, 0.15); color: #4ade80; border-bottom: 2px solid #22c55e; }
        
        .data-list { list-style: none; padding: 0; margin: 0; }
        .list-header { display: flex; justify-content: space-between; padding: 6px 12px; font-size: 12px; color: #8898aa; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .list-header-left { display: flex; gap: 16px; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 0 12px; height: 32px; border-bottom: 1px solid rgba(255,255,255,0.03); width: 100%; }
        .item-left { display: flex; align-items: center; gap: 12px; width: 180px; }
        .col-id { color: #6486a3; font-family: monospace; font-size: 13px; width: 48px; flex-shrink: 0; }
        .name-wrapper { position: relative; display: inline-block; max-width: 110px; }
        .col-name { color: #fff; font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .col-qty { text-align: right; font-family: monospace; font-weight: 700; font-size: 14px; white-space: nowrap; flex-grow: 1; }
        
        .val-buy { color: #f87171 !important; }
        .val-sell { color: #4ade80 !important; }
        
        .empty-row { color: #334155; font-style: italic; font-size: 13px; padding: 16px; text-align: center; }
    </style>
</head>
<body>

    <div class="infographic">
        <div class="main-header">
            <div class="main-title">投信成分股異動分析</div>
            <div class="date-badge">資料更新完畢</div>
        </div>
        
        <div id="content"></div>
        
    </div>

</body>
</html>
