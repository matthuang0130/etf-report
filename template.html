<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成分股異動分析</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000; 
            font-family: 'Noto Sans TC', sans-serif; 
            display: flex;
            justify-content: center;
            padding: 0; margin: 0;
        }

        /* 🌟 修正點 2：解開 720px 的死鎖！電腦版維持最大 720px，手機版會自動貼齊邊緣 */
        .infographic {
            width: 100%;
            max-width: 720px; 
            background-color: #060a14;
            border-left: 2px solid #1a2c4e;
            border-right: 2px solid #1a2c4e;
            border-bottom: 2px solid #1a2c4e;
            overflow: hidden;
        }

        /* ======== 總標題區 ======== */
        .main-header {
            background: linear-gradient(180deg, #0f1c35 0%, #060a14 100%);
            text-align: center;
            padding: 14px 10px 10px;
            border-bottom: 2px solid #1a2c4e;
            border-top: 2px solid #1a2c4e;
            position: relative;
        }
        .main-header::after {
            content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
            width: 250px; height: 2px; background: #00aaff; box-shadow: 0 0 10px #00aaff;
        }
        
        /* 🌟 修正點 3：標題字體大小自適應，手機不突兀 */
        .main-title {
            color: #fff; font-size: 22px; font-weight: 900; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.5); margin-bottom: 4px;
        }
        @media (min-width: 600px) {
            .main-title { font-size: 28px; }
        }
        
        .date-badge {
            display: inline-block; background: rgba(0, 170, 255, 0.15); color: #00aaff;
            padding: 2px 14px; border-radius: 12px; font-size: 13px; font-weight: 700;
            border: 1px solid rgba(0, 170, 255, 0.3); letter-spacing: 1px;
        }

        /* ======== 單檔 ETF 區塊 ======== */
        .etf-section {
            padding: 10px 14px;
            border-bottom: 2px solid #1a2c4e;
        }
        .etf-section:last-child {
            border-bottom: none;
        }
        
        .etf-title {
            color: #e0e6ed; font-size: 17px; font-weight: 900; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .etf-title span {
            color: #00aaff; background: rgba(0, 170, 255, 0.1); padding: 1px 6px;
            border-radius: 4px; border: 1px solid #00aaff; font-size: 15px;
        }

        /* ======== 左右並排網格佈局 ======== */
        .tables-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 電腦版左右各半 */
            gap: 12px; 
            margin-bottom: 8px;
        }

        /* 🌟 修正點 4：當手機螢幕寬度小於 600px，強迫將左右並排改成「上下排列」 */
        @media (max-width: 600px) {
            .tables-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }

        .table-box {
            background: #0d1424; border-radius: 6px; overflow: hidden; border: 1px solid #1e2c45;
        }

        .box-header {
            display: flex; justify-content: space-between; padding: 5px 10px; font-size: 13px; font-weight: 700;
        }
        .header-buy { background: rgba(239, 68, 68, 0.15); color: #f87171; border-bottom: 2px solid #ef4444; }
        .header-sell { background: rgba(34, 197, 94, 0.15); color: #4ade80; border-bottom: 2px solid #22c55e; }

        /* ======== 數據清單格式 ======== */
        .data-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .list-header {
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            font-size: 12px;
            color: #8898aa;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .list-header-left {
            display: flex;
            gap: 16px;
        }
    </style>
</head>
<body>

    <div class="infographic">
        <div id="content"></div>
    </div>

</body>
</html>
