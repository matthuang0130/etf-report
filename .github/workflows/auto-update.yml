name: 🤖 每日自動更新 ETF 報表

on:
  schedule:
    # 🌟 2026 年最新寫法：直接指定台北時區！(每天晚上 19:30 執行)
    - cron: '30 19 * * *'
      timezone: 'Asia/Taipei'
  workflow_dispatch: # 允許手動點擊觸發

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 下載您的程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 抓取完整歷史紀錄以利防撞合併

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安裝必備套件
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests selenium webdriver-manager

      - name: 4. 🤖 執行自動爬蟲與產出報表 (二合一)
        # 🌟 直接執行您這支包山包海的 generate.py 即可
        run: python script/generate.py

      - name: 5. 💾 將新檔案與報表存檔並推回 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 加入 git pull --rebase 終極防撞機制
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 機器人自動抓檔與更新報表" && git pull --rebase && git push)