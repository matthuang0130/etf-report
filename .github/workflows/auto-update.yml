name: 自動更新 ETF 報表

# 告訴機器人：只要有人把檔案上傳到 data/ 資料夾，就立刻開工
on:
  push:
    paths:
      - 'data/**'

# 給予機器人修改並上傳檔案的權限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Linux 雲端電腦

    steps:
      - name: 1. 下載您的程式碼
        uses: actions/checkout@v4

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝必備套件 (pandas, openpyxl)
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: 4. 執行自動清洗與產出報表
        run: python script/generate.py

      - name: 5. 將產出的 HTML 存檔並推回 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          # 檢查是否有變更，有變更才進行 commit 與 push
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 機器人自動更新報表" && git push)