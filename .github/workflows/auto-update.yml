name: 🤖 每日手動更新 ETF 報表

# 🌟 修改這裡：移除 schedule 定時排程，只保留手動觸發與 Git Push 備用觸發
on:
  workflow_dispatch: # 💡 開啟 GitHub 網頁上的「手動執行」淺綠色按鈕
  push:
    branches:
      - main       # 💡 當您從本地電腦 Git Push 程式碼上來時，雲端也會自動順便跑一次

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 下載您的程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安裝必備套件 (包含爬蟲與HTML解析所需)
        run: |
          python -m pip install --upgrade pip
          # 🌟 保留您原本爬蟲所需的所有專業套件（pandas, selenium 等），並維持 lxml 備戰
          pip install pandas openpyxl requests selenium webdriver-manager lxml

      - name: 4. 🤖 執行自動爬蟲抓取最新檔案
        run: python etf_downloader.py

      - name: 5. 🧮 執行自動清洗與產出報表
        run: python script/generate.py

      - name: 6. 💾 將新檔案與報表存檔並推回 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 💡 智慧防呆：檢查有沒有新檔案。有新檔案才 Commit，沒新檔案就直接跳過，絕對不報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 手動更新：同步最新 ETF 資料與優化版報表" && git pull --rebase && git push)