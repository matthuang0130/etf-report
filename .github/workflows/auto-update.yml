name: 🤖 每日手動更新 ETF 報表

# 🌟 終極閹割：砍掉 push 與 schedule，只有手動點網頁按鈕才會執行！
on:
  workflow_dispatch: # 唯一的觸發條件

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 下載您的程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安裝必備套件 (包含爬蟲與HTML解析所需)
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests selenium webdriver-manager lxml

      - name: 4. 🤖 執行自動爬蟲抓取最新檔案
        run: python etf_downloader.py

      - name: 5. 🧮 執行自動清洗與產出報表
        run: python script/generate.py

      - name: 6. 💾 將新檔案與報表存檔並推回 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 手動更新：同步最新 ETF 資料與優化版報表" && git push)